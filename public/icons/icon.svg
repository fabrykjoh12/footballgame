<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Ball Knowledge">
  <defs>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7dffab"/>
      <stop offset="1" stop-color="#1f9e4d"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.32" r="0.7">
      <stop offset="0" stop-color="#0a2418"/>
      <stop offset="1" stop-color="#04140c"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="url(#glow)"/>
  <!-- subtle pitch arc -->
  <circle cx="256" cy="200" r="120" fill="none" stroke="#39ff7a" stroke-opacity="0.15" stroke-width="3"/>
  <line x1="64" y1="380" x2="448" y2="380" stroke="#39ff7a" stroke-opacity="0.12" stroke-width="3"/>
  <!-- monogram -->
  <text x="256" y="312" text-anchor="middle" font-family="'Space Grotesk', system-ui, sans-serif"
        font-size="240" font-weight="700" fill="url(#neon)" letter-spacing="-12">BK</text>
</svg>
