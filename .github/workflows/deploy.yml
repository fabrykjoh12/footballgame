# Builds the app and publishes it to the gh-pages branch on every push.
# GitHub Pages is configured to "Deploy from a branch" → gh-pages, so this
# replaces the manual deploy. Multiplayer turns on automatically once the
# VITE_ABLY_API_KEY repository secret is set (until then it deploys in demo
# mode, which still works).
name: Deploy preview

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Let the most recent push win, but don't cancel a run mid-publish.
concurrency:
  group: deploy-preview
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Unit tests
        run: npm test

      - name: Build (relative base for Project Pages)
        run: npm run build:pages
        env:
          # Optional: add this repo secret to enable live Ably multiplayer.
          VITE_ABLY_API_KEY: ${{ secrets.VITE_ABLY_API_KEY }}
          # Optional: Supabase multiplayer (alternative to Ably).
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # Optional: Firebase sign-in + cross-device progress sync.
          # Add these repo secrets to show the Sign in button. See FIREBASE_SETUP.md.
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}

      - name: Bundle-size budget (entry chunk must stay code-split)
        run: node scripts/check-bundle.mjs

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # peaceiris adds .nojekyll automatically.
